spring.application.name=J2EE_BUIBINHNGUYEN_2280811880_03-03

server.port=${SERVER_PORT:0}

# Cau hinh ket noi MySQL (co the override bang bien moi truong DB_PASSWORD)
spring.datasource.url=jdbc:mysql://localhost:3306/mydb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Disable schema/data auto-init for MySQL
spring.sql.init.mode=never

# Hien thi log SQL ra console de debug
logging.level.org.springframework.jdbc.core=DEBUG
